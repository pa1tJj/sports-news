<div class="container mt-4">

    <div class="card mb-3">
        <div class="card-header">Search Customer</div>
        <div class="card-body">

            <div class="row">
                <div class="col-md-3">
                    <input id="username" class="form-control" placeholder="Username">
                </div>

                <div class="col-md-3">
                    <input id="phone" class="form-control" placeholder="Phone">
                </div>

                <div class="col-md-3">
                    <input id="email" class="form-control" placeholder="Email">
                </div>

                <div class="col-md-3">
                    <select id="status" class="form-control" name="status">
                        <option value="">-- Status --</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary btnSearch" >Search</button>
                <button class="btn btn-secondary" >Reset</button>
            </div>

        </div>
    </div>

    <!-- 📋 TABLE -->
    <div class="table customers">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Barcelona thắng 3-0</td>
                    <td>Football</td>
                    <td>Published</td>
                    <td>1500</td>
                    <td>
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="dialog-box"></div>

    <!-- Paging -->
    <div class="paging">
        <nav aria-label="Page navigation example">
            <ul class="pagination">
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

</div>

<script type="module" src="./customers.js"></script>
