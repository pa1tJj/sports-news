<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../news/css/news.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>
    <div class="search">
        <div class="d-flex gap-3">
            <div class="input-group input-group-sm mb-3 w-50">
                <span class="input-group-text" id="inputGroup-sizing-sm">Title</span>
                <input type="text" class="form-control" aria-label="Sizing example input" placeholder="search..."
                    aria-describedby="inputGroup-sizing-sm" name="title" id="title">
            </div>
            <div class="input-group mb-3 w-25 news-sortby-filter">
                <label class="input-group-text" for="inputGroupSelect01">Sắp xếp theo</label>
                <select class="form-select" id="sortBy" name="sortBy">
                    <option selected>Choose...</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
        </div>

        <div class="d-flex gap-3">
            <div class="input-group mb-3 w-25 news-category-filter">
                <label class="input-group-text" for="inputGroupSelect01">Category</label>
                <select class="form-select" id="category" name="category">
                    <option selected>Choose...</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
            <div class="input-group mb-3 w-25 news-status-filter">
                <label class="input-group-text" for="inputGroupSelect01">Status</label>
                <select class="form-select" id="status" name="status">
                    <option selected>Choose...</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
            <div class="input-group mb-3 w-25 news-author-filter">
                <label class="input-group-text" for="inputGroupSelect01">Author</label>
                <select class="form-select" id="user" name="user">
                    <option selected>Choose...</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
            <div class="input-group mb-3 w-25 news-date-filter">
                <label class="input-group-text" for="inputGroupSelect01">Date</label>
                <select class="form-select" id="date" name="date">
                    <option selected>Choose...</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
        </div>

        <button type="button" class="btn btn-info" id="btnSearch">Tìm kiếm</button>
    </div>

    <div class="table-data">
        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-success" id="btnAdd">
                <i class="bi bi-plus"></i>
            </button>

            <button class="btn btn-danger" id="btnDelete">
                <i class="bi bi-trash"></i>
            </button>
        </div>

        <div class="table">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th></th>
                        <th>Index</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Created Date</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody class="tbody">
                    <tr>
                        <td>1</td>
                        <td>Barcelona thắng 3-0</td>
                        <td>Football</td>
                        <td>Published</td>
                        <td>1500</td>
                        <td>2026-03-05</td>
                        <td>
                            <button class="btn btn-warning btn-sm me-2"></button>
                            <button class="btn btn-danger btn-sm"></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>       
    </div>

    <div class="paging">
        <nav aria-label="Page navigation example">
            <ul class="pagination">
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    <script type="module" src="news.js"></script>
</body>

</html>
