<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../dashboard/admin_dashboard.css">
    <link rel="stylesheet" href="../news/css/news.form.css">
    <link rel="stylesheet" href="../components/header.css">
</head>

<body>
    <div class="main">
        <div class="my-header"></div>
        <div class="wrapper">
            <div class="container mt-4 ">
                <h2>Edit News</h2>
                
                <form action="" id="form-news" method="POST">
                    <!-- Title -->
                    <div class="mb-3 form-group">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" placeholder="Enter title" id="title" name="title">
                        <div><span class="form-messenger"></span></div>
                    </div>
                    
                    <!-- Slug -->
                    <div class="mb-3 form-group">
                        <label class="form-label">Slug</label>
                        <input type="text" class="form-control" placeholder="auto-generated-slug" id="slug" name="slug">
                        <div><span class="form-messenger"></span></div>
                    </div>
                    
                    <!-- Summary -->
                    <div class="mb-3 form-group">
                        <label class="form-label">Summary</label>
                        <textarea class="form-control" rows="3" id="summary" name="summary"></textarea>
                        <div><span class="form-messenger"></span></div>
                    </div>
                    
                    <!-- Content -->
                    <div class="mb-3 form-group">
                        <label class="form-label">Content</label>
                        <textarea id="content" name="content" class="form-control"></textarea>
                        <div><span class="form-messenger"></span></div>
                    </div>
                    
                    <div class="row">
                        <!-- Thumbnail -->
                        <div class="col-md-4 mb-3  form-group">
                            <label class="form-label">Thumbnail</label>
                            <!-- input chọn ảnh -->
                            <input type="file" class="form-control" id="thumbnail" name="thumbnail">
                            <!-- preview ảnh -->
                            <div class="mt-2">
                                <img id="thumbnailPreview" class="thumbnail-preview" name="thumbnailPreview"
                                    src="">
                            </div>
                            <div><span class="form-messenger"></span></div>
                        </div>
                        <div class="col-md-4 mb-3 form-group">
                            <label class="form-label">Category</label>
                            <select class="form-select" multiple id="categories" name="categories">
                                <option>Football</option>
                                <option>Premier League</option>
                                <option>Transfer</option>
                            </select>
                            <div><span class="form-messenger"></span></div>
                        </div>
                        <div class="col-md-4 mb-3 form-group">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option>DRAFT</option>
                                <option>PUBLISHED</option>
                            </select>                            
                            <div><span class="form-messenger"></span></div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3 form-group">
                            <label class="form-label">Tags</label>
                            <select class="form-select" multiple id="tags" name="tags">
                                <option>Messi</option>
                                <option>Barcelona</option>
                                <option>Transfer</option>
                            </select>
                            <div><span class="form-messenger"></span></div>
                        </div>
                    </div>
                    <!-- Featured -->
                    <div class="row">
                        <div class="form-check mb-3 form-group">
                            <input class="form-check-input" type="checkbox" id="isFeatured" name="isFeatured">
                            <label class="form-check-label">
                                Featured news
                            </label>
                        </div>
                        <div><span class="form-messenger"></span></div>
                    </div>
                    
                    <!-- Buttons -->
                    <button type="submit" class="btn btn-primary" id="btnSave">
                        Save
                    </button>
                    <button type="button" class="btn btn-secondary">
                        Cancel
                    </button>
                
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
    <script>
        document.getElementById("thumbnail").addEventListener("change", function (event) {
            const file = event.target.files[0];
            const preview = document.getElementById("thumbnailPreview");
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.classList.remove("d-none");
            }
        });
    </script>
    <script type="module" src="news.form.js"></script>

</body>

</html>
