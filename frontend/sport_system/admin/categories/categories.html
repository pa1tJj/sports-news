<div class="card mt-4 shadow-sm category-form">
    <div class="card-header custom-header text-white">
        Category Form
    </div>

    <div class="card-body">
        <form>
            <input type="hidden" name="id" id="id">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter category name" id="name" name="name">
            </div>

            <div class="mb-3">
                <label class="form-label">Slug</label>
                <input type="text" class="form-control" placeholder="auto-generated-slug" id="slug" name="slug">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="3" id="description" name="description"></textarea>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-success btn-save">Save</button>
                <button type="reset" class="btn btn-secondary btn-reset">Reset</button>
            </div>

        </form>

    </div>
</div>

<!-- Table -->
<div class="table-data">
    <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-success" id="btnAdd">+ Add Category</button>
    </div>
    <div class="table">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th></th>
                    <th>Index</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th>Description</th>
                    <th width="160">Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" data-id="${element.id}">
                        </div>
                    </td>
                    <td>1</td>
                    <td>Football</td>
                    <td>football</td>
                    <td>Football news</td>
                    <td>
                        <button class="btn btn-warning btn-sm btn-edit" data-id="${element.id}"><i
                                class="bi bi-pencil"></i></button>
                        <button class="btn btn-danger btn-sm btn-delete" data-id="${element.id}"><i
                                class="bi bi-trash"></i></button>
                    </td>
                </tr>

                <tr>
                    <td>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" data-id="${element.id}">
                        </div>
                    </td>
                    <td>2</td>
                    <td>Basketball</td>
                    <td>basketball</td>
                    <td>Basketball news</td>
                    <td>
                        <button class="btn btn-warning btn-sm btn-edit" data-id="${element.id}"><i
                                class="bi bi-pencil"></i></button>
                        <button class="btn btn-danger btn-sm btn-delete" data-id="${element.id}"><i
                                class="bi bi-trash"></i></button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>

<div class="dialog-box"></div>

<script type="module" src="./categories.js"></script>
