<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tag Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .custom-header {
            background: #1e293b;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body style="background-color:#f8fafc;">

<div class="container mt-4">

    <!-- FORM -->
    <div class="card shadow-sm mb-4">
        <div class="card-header custom-header">
            Tag Form
        </div>

        <div class="card-body">
            <input type="hidden" name="id" id="id">
            <div class="mb-3">
                <label class="form-label">Tag Name</label>
                <input type="text" class="form-control" placeholder="Enter tag name" id="name" name="name">
            </div>
        
            <div class="mb-3">
                <label class="form-label">Slug</label>
                <input type="text" class="form-control" placeholder="auto-generated-slug" id="slug" name="slug">
            </div>
        
            <div class="text-end">
                <button type="submit" class="btn btn-success" id="btnSave">
                    <i class="bi bi-check"></i> Save
                </button>
                <button type="reset" class="btn btn-secondary" id="btnReset">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-header custom-header d-flex justify-content-between align-items-center">
            <span>Tag List</span>
            <button class="btn btn-success btn-sm btnAdd">
                <i class="bi bi-plus"></i> Add Tag
            </button>
        </div>

        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th></th>
                    <th>Index</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th width="150">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr>
                    <td>
                        <input type="checkbox">
                    </td>
                    <td>1</td>
                    <td>Premier League</td>
                    <td>premier-league</td>
                    <td>
                        <button class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
     
    <div class="dialog-box"></div>

    <!-- Paging -->
    <div class="paging">
        <nav aria-label="Page navigation example">
            <ul class="pagination">
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

</div>

</body>
</html>
